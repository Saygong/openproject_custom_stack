#version: '3.9'

x-op-restart-policy: &restart_policy
  restart: unless-stopped

networks:
  backend:
    driver: bridge


services:

  db:
    image: postgres:${DB_VERSION_TAG:-17}
    container_name: openproject_db
    <<: *restart_policy
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./postgres/pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: openproject
    networks:
      - backend

  app:
    image: openproject/openproject:${APP_VERSION_TAG:-17}
    container_name: openproject_app
    <<: *restart_policy
    environment:
    # For testing purposes
      OPENPROJECT_HTTPS: false
      OPENPROJECT_HSTS: false

      OPENPROJECT_HOST__NAME: ${APP_HOSTNAME:-localhost}
      SECRET_KEY_BASE: ${APP_SECRET_KEY}
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/openproject
    depends_on:
      - db
    volumes:
      - ./openproject/assets:/var/openproject/assets
    networks:
      - backend

  proxy:
    image: nginx:${PROXY_VERSION_TAG:-alpine}
    container_name: nginx_proxy
    <<: *restart_policy
    ports:
      - "${PROXY_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - backend

