

server {
    listen 80;
    server_name openproject.local;

    # Log (utile per debug)
    access_log /var/log/nginx/openproject.access.log;
    error_log /var/log/nginx/openproject.error.log;

    # Dimensione upload (OpenProject può gestire allegati)
    client_max_body_size 50M;

    location / {
        proxy_pass http://app:8080;

        # ===== HEADERS FONDAMENTALI =====
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ===== TIMEOUT (OpenProject può essere lento su startup) =====
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # ===== Websocket / upgrade (safe default) =====
        proxy_http_version 1.1;
        #proxy_set_header Upgrade $http_upgrade;
        #proxy_set_header Connection "upgrade";
    }
}